
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas - Chave</title>
    <style>
        /* Reset básico */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
        }

        body {
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container em formato de chave (cabeça redonda, corpo reto) */
        .key-container {
            background: linear-gradient(135deg, #f39c12, #d35400);
            padding: 40px;
            /* Aqui está a mágica: bordas assimétricas para parecer uma chave */
            border-radius: 50px 15px 15px 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* O 'furo' do chaveiro na ponta da chave */
        .key-hole {
            width: 25px;
            height: 25px;
            background-color: #1a1a2e;
            border-radius: 50%;
            position: absolute;
            top: 30px;
            left: 25px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.8);
        }

        h2 { 
            text-align: center; 
            margin-bottom: 20px; 
            margin-left: 20px; /* Compensa o espaço do furo */
            font-weight: 900; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4); 
        }

        /* Visor da Senha */
        .password-display {
            background-color: #fff;
            color: #333;
            padding: 15px;
            font-size: 22px;
            letter-spacing: 2px;
            border-radius: 8px;
            margin-bottom: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            font-weight: bold;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.2);
        }

        /* Área de Configurações */
        .settings { 
            margin-bottom: 20px; 
            background: rgba(0,0,0,0.15); 
            padding: 15px; 
            border-radius: 8px; 
        }

        .setting { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            font-weight: 600; 
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
        }
        
        .setting:last-child { margin-bottom: 0; }

        .setting input[type="number"] { 
            width: 60px; 
            padding: 5px; 
            border-radius: 4px; 
            border: none; 
            font-weight: bold; 
            text-align: center; 
        }
        
        .setting input[type="checkbox"] { 
            width: 20px; 
            height: 20px; 
            cursor: pointer; 
        }

        /* Botões */
        .btn-group { display: flex; gap: 10px; }
        
        button {
            flex: 1; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            transition: 0.2s;
            text-transform: uppercase;
        }
        
        .btn-generate { background-color: #2c3e50; }
        .btn-generate:hover { background-color: #1a252f; transform: scale(1.03); }
        
        .btn-copy { background-color: #27ae60; }
        .btn-copy:hover { background-color: #2ecc71; transform: scale(1.03); }
    </style>
</head>
