<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Chave Mestra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #11141a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        /* Formato de Chave: Cabeça arredondada na esquerda, corpo na direita */
        .key-container {
            background: linear-gradient(135deg, #ffd700, #b8860b);
            padding: 40px;
            border-radius: 80px 20px 20px 80px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 2px 5px rgba(255,255,255,0.5);
            width: 100%;
            max-width: 460px;
            position: relative;
            border: 2px solid #daa520;
        }

        /* O furo do chaveiro */
        .key-ring-hole {
            width: 35px;
            height: 35px;
            background-color: #11141a;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 25px;
            transform: translateY(-50%);
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.8);
        }

        /* Conteúdo interno recuado para não cobrir o furo */
        .key-content {
            margin-left: 45px;
        }

        h2 {
            text-align: center;
            color: #11141a;
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        /* Visor da Senha */
        .password-display {
            background-color: #ffffff;
            color: #ff3333; /* Começa vermelho se o JS falhar */
            padding: 15px;
            font-size: 18px;
            letter-spacing: 1px;
            border-radius: 8px;
            margin-bottom: 20px;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            font-weight: bold;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Configurações */
        .settings-panel {
            background: rgba(0, 0, 0, 0.25);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #11141a;
            font-weight: bold;
        }

        .option-row:last-child {
            margin-bottom: 0;
        }

        .option-row input[type="number"] {
            width: 55px;
            padding: 4px;
            border-radius: 4px;
            border: 1px solid #11141a;
            font-weight: bold;
            text-align: center;
        }

        .option-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Botões */
        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-transform: uppercase;
            color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        #btn-generate {
            background-color: #1a252f;
        }

        #btn-generate:hover {
            background-color: #2c3e50;
        }

        #btn-generate:active {
            transform: scale(0.98);
        }

        #btn-copy {
            background-color: #27ae60;
        }

        #btn-copy:hover {
            background-color: #2ecc71;
        }

        #btn-copy:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="key-container">
        <div class="key-ring-hole"></div>
        
        <div class="key-content">
            <h2>Gerador Chave</h2>
            
            <div class="password-display" id="password">ERRO: Script JS não carregou!</div>

            <div class="settings-panel">
                <div class="option-row">
                    <label for="length">Dígitos:</label>
                    <input type="number" id="length" value="12" min="4" max="40">
                </div>
                <div class="option-row">
                    <label for="uppercase">Maiúsculas (A-Z)</label>
                    <input type="checkbox" id="uppercase" checked>
                </div>
                <div class="option-row">
                    <label for="lowercase">Minúsculas (a-z)</label>
                    <input type="checkbox" id="lowercase" checked>
                </div>
                <div class="option-row">
                    <label for="numbers">Números (0-9)</label>
                    <input type="checkbox" id="numbers" checked>
                </div>
                <div class="option-row">
                    <label for="symbols">Símbolos (!@#)</label>
                    <input type="checkbox" id="symbols" checked>
                </div>
            </div>

            <div class="button-group">
                <button id="btn-generate">Gerar</button>
                <button id="btn-copy">Copiar</button>
            </div>
        </div>
    </div>

    <script>
        // Executa apenas quando toda a página estiver pronta
        document.addEventListener('DOMContentLoaded', () => {
            const btnGenerate = document.getElementById('btn-generate');
            const btnCopy = document.getElementById('btn-copy');
            const passwordDisplay = document.getElementById('password');

            // Se o JavaScript chegou até aqui, limpa o aviso de erro do visor
            passwordDisplay.textContent = "Clique em Gerar";
            passwordDisplay.style.color = "#11141a";

            // Evento de clique para GERAR a senha
            btnGenerate.addEventListener('click', () => {
                const length = parseInt(document.getElementById('length').value) || 12;
                const hasUpper = document.getElementById('uppercase').checked;
                const hasLower = document.getElementById('lowercase').checked;
                const hasNumbers = document.getElementById('numbers').checked;
                const hasSymbols = document.getElementById('symbols').checked;

                const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const lower = 'abcdefghijklmnopqrstuvwxyz';
                const numbers = '0123456789';
                const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';

                let pool = '';
                if (hasUpper) pool += upper;
                if (hasLower) pool += lower;
                if (hasNumbers) pool += numbers;
                if (hasSymbols) pool += symbols;

                // Validação caso o usuário desmarque tudo
                if (pool === '') {
                    passwordDisplay.textContent = 'Marque uma opção!';
                    passwordDisplay.style.color = '#cc0000';
                    return;
                }

                let password = '';
                for (let i = 0; i < length; i++) {
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    password += pool[randomIndex];
                }

                // Exibe a senha gerada
                passwordDisplay.textContent = password;
                passwordDisplay.style.color = '#11141a';
            });

            // Evento de clique para COPIAR a senha
            btnCopy.addEventListener('click', () => {
                const text = passwordDisplay.textContent;
                if (text === 'Clique em Gerar' || text === 'Marque uma opção!' || text === 'ERRO: Script JS não carregou!') {
                    alert('Gere uma senha válida primeiro!');
                    return;
                }

                // Copiador universal temporário
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                
                try {
                    document.execCommand('copy');
                    alert('Chave copiada com sucesso!');
                } catch (err) {
                    alert('Erro ao copiar.');
                }
                
                document.body.removeChild(textarea);
            });
        });
    </script>
</body>
</html>
